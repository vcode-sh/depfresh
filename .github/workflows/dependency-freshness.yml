# Dependency Freshness -- because "we'll update later" is not a strategy.
name: Dependency Freshness

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: depfresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  depfresh:
    name: Run depfresh
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate depfresh JSON report
        shell: bash
        run: |
          set +e
          pnpm exec depfresh --output json --fail-on-outdated > depfresh-report.json
          EXIT_CODE=$?
          set -e
          case "$EXIT_CODE" in
            0|1)
              node --input-type=module --eval '
                import { readFileSync } from "node:fs"
                const report = JSON.parse(readFileSync("depfresh-report.json", "utf8"))
                if (!Number.isSafeInteger(report?.summary?.total) || report.summary.total < 0) {
                  throw new Error("Invalid depfresh report")
                }
              '
              ;;
            *)
              exit "$EXIT_CODE"
              ;;
          esac

      - name: Upload depfresh report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: depfresh-report
          path: depfresh-report.json
