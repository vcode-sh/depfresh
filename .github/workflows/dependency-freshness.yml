# Dependency Freshness -- because "we'll update later" is not a strategy.
name: Dependency Freshness

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: depfresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  depfresh:
    name: Run depfresh
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate depfresh JSON report
        shell: bash
        run: |
          set +e
          pnpm exec depfresh --output json --fail-on-outdated > depfresh-report.json
          EXIT_CODE=$?
          set -e
          case "$EXIT_CODE" in
            0|1)
              node --input-type=module --eval '
                import { readFileSync } from "node:fs"
                const report = JSON.parse(readFileSync("depfresh-report.json", "utf8"))
                if (!Number.isSafeInteger(report?.summary?.total) || report.summary.total < 0) {
                  throw new Error("Invalid depfresh report")
                }
              '
              ;;
            *)
              exit "$EXIT_CODE"
              ;;
          esac

      - name: Upload depfresh report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: depfresh-report
          path: depfresh-report.json
