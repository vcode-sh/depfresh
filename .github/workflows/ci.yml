# CI -- the thing that catches what you missed locally.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node 24.15.0)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify generated schemas
        run: pnpm schemas:check

      - name: Test Action adversarial harness
        run: pnpm exec vitest run test/github-action.test.ts --retry=0

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint with zero warnings
        run: pnpm exec biome check --error-on-warnings .

      - name: Build tested distribution
        run: pnpm build

      - name: Run tests
        run: pnpm test:run --coverage

      - name: Upload tested distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: depfresh-tested-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  build:
    name: Verify tested build
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Download tested distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: depfresh-tested-dist
          path: dist

      - name: Verify artifacts exist
        run: |
          echo "## Build Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          for file in dist/cli.mjs dist/index.mjs dist/index.d.ts; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing artifact: $file -- something went very wrong"
              exit 1
            fi
            size=$(du -h "$file" | cut -f1)
            echo "| \`$file\` | $size |" >> "$GITHUB_STEP_SUMMARY"
          done

  visual-plus-pty:
    name: Visual Plus PTY (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download tested distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: depfresh-tested-dist
          path: dist

      - name: Test Visual Plus PTY and fallbacks
        run: pnpm exec vitest run test/visual-plus-cli.test.ts --retry=0

      - name: Install exact isolated npm
        shell: bash
        run: |
          set -euo pipefail
          NPM_TOOL_ROOT=$(mktemp -d "$RUNNER_TEMP/depfresh-visual-plus-npm.XXXXXX")
          printf 'NPM_TOOL_ROOT=%s\n' "$NPM_TOOL_ROOT" >> "$GITHUB_ENV"
          mkdir -p "$NPM_TOOL_ROOT/home" "$NPM_TOOL_ROOT/cache" "$NPM_TOOL_ROOT/prefix" "$NPM_TOOL_ROOT/xdg-cache"
          : > "$NPM_TOOL_ROOT/user.npmrc"
          : > "$NPM_TOOL_ROOT/global.npmrc"
          NODE_CLI=$(command -v node)
          NPM_BOOTSTRAP=$(command -v npm)
          env -i HOME="$NPM_TOOL_ROOT/home" PATH="$(dirname "$NODE_CLI"):/usr/bin:/bin" \
            "$NPM_BOOTSTRAP" install --global --ignore-scripts --no-audit --no-fund \
            --registry https://registry.npmjs.org/ --userconfig "$NPM_TOOL_ROOT/user.npmrc" \
            --globalconfig "$NPM_TOOL_ROOT/global.npmrc" --cache "$NPM_TOOL_ROOT/cache" \
            --prefix "$NPM_TOOL_ROOT/prefix" npm@12.0.1
          [[ "$("$NPM_TOOL_ROOT/prefix/bin/npm" --version)" == '12.0.1' ]]
          printf '%s\n' "$NPM_TOOL_ROOT/prefix/bin" >> "$GITHUB_PATH"
          {
            printf 'HOME=%s\n' "$NPM_TOOL_ROOT/home"
            printf 'NPM_CONFIG_CACHE=%s\n' "$NPM_TOOL_ROOT/cache"
            printf 'NPM_CONFIG_GLOBALCONFIG=%s\n' "$NPM_TOOL_ROOT/global.npmrc"
            printf 'NPM_CONFIG_REGISTRY=https://registry.npmjs.org/\n'
            printf 'NPM_CONFIG_USERCONFIG=%s\n' "$NPM_TOOL_ROOT/user.npmrc"
            printf 'XDG_CACHE_HOME=%s\n' "$NPM_TOOL_ROOT/xdg-cache"
          } >> "$GITHUB_ENV"

      - name: Replay Visual Plus against the installed packed artifact
        run: |
          mkdir -p artifacts
          npm pack --json --ignore-scripts --pack-destination artifacts > artifacts/visual-plus-pack.json
          node scripts/verify-packed-package.mjs artifacts/visual-plus-pack.json --visual-plus

      - name: Test pure reduced-motion contracts
        run: pnpm exec vitest run src/commands/check/visual-plus/capabilities.test.ts src/commands/check/visual-plus/renderer.test.ts

      - name: Clean isolated npm
        if: ${{ always() }}
        run: |
          if [[ -n "${NPM_TOOL_ROOT:-}" ]]; then rm -rf -- "$NPM_TOOL_ROOT"; fi

  distribution-smoke:
    name: Distribution Smoke
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download tested distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: depfresh-tested-dist
          path: dist

      - name: Smoke test tested build
        run: |
          set -euo pipefail
          node dist/cli.mjs --help
          node dist/cli.mjs --version

      - name: Practical CLI smoke tests
        run: pnpm test:smoke

      - name: Package dry run
        run: npm pack --dry-run --json --ignore-scripts

      - name: Pack verified distribution
        run: |
          mkdir -p artifacts
          npm pack --json --ignore-scripts --pack-destination artifacts > artifacts/pack.json
          node scripts/verify-packed-package.mjs artifacts/pack.json

      - name: Upload tested package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: depfresh-tested-package
          path: artifacts
          if-no-files-found: error
          retention-days: 1

  windows-installed:
    name: Installed distribution (Windows)
    runs-on: windows-2025
    needs: distribution-smoke
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 24.15.0

      - name: Download tested package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: depfresh-tested-package
          path: artifacts

      - name: Install exact tested tarball
        shell: pwsh
        run: |
          $tarballName = node scripts/read-pack-manifest.mjs artifacts/pack.json filename
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $tarball = (Get-Item -LiteralPath (Join-Path $PWD "artifacts/$tarballName")).FullName
          $installRoot = Join-Path $env:RUNNER_TEMP 'depfresh-installed'
          New-Item -ItemType Directory -Path $installRoot -Force | Out-Null
          npm install --prefix $installRoot --ignore-scripts --no-audit --no-fund $tarball
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $commandShim = Join-Path $installRoot 'node_modules/.bin/depfresh.cmd'
          if (!(Test-Path -LiteralPath $commandShim -PathType Leaf)) {
            throw 'Installed depfresh command shim is unavailable'
          }
          $commandShim = (Get-Item -LiteralPath $commandShim).FullName
          "DEPFRESH_COMMAND_SHIM=$commandShim" >> $env:GITHUB_ENV

      - name: Verify installed command shim
        shell: pwsh
        run: node scripts/verify-installed-read-only.mjs "$env:DEPFRESH_COMMAND_SHIM"
