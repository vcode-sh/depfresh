# CI -- the thing that catches what you missed locally.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node 24.15.0)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify generated schemas
        run: pnpm schemas:check

      - name: Test Action adversarial harness
        run: pnpm exec vitest run test/github-action.test.ts

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint with zero warnings
        run: pnpm exec biome check --error-on-warnings .

      - name: Build test distribution
        run: pnpm build

      - name: Run tests
        run: pnpm test:run --coverage

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify artifacts exist
        run: |
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          for file in dist/cli.mjs dist/index.mjs dist/index.d.ts; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing artifact: $file -- something went very wrong"
              exit 1
            fi
            size=$(du -h "$file" | cut -f1)
            echo "| \`$file\` | $size |" >> $GITHUB_STEP_SUMMARY
          done

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  distribution-smoke:
    name: Distribution Smoke
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Smoke test local build
        run: |
          set -euo pipefail
          node dist/cli.mjs --help
          node dist/cli.mjs --version

      - name: Practical CLI smoke tests
        run: pnpm test:smoke

      - name: Package dry run
        run: npm pack --dry-run --json --ignore-scripts

      - name: Verify packed package
        run: |
          mkdir -p artifacts
          npm pack --json --ignore-scripts --pack-destination artifacts > artifacts/pack.json
          node scripts/verify-packed-package.mjs artifacts/pack.json
