# PR Validation -- trust but verify. Mostly verify.
name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify generated schemas
        run: pnpm schemas:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Lint with zero warnings
        run: pnpm exec biome check --error-on-warnings .

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:run

      - name: Practical CLI smoke tests
        run: pnpm test:smoke

      - name: Package dry run
        run: npm pack --dry-run --json --ignore-scripts

  security:
    name: Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Non-blocking -- flags issues without killing the PR
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  size-check:
    name: Size Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Report bundle sizes
        run: |
          echo "## Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Raw | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- |" >> $GITHUB_STEP_SUMMARY
          for file in dist/cli.mjs dist/index.mjs; do
            if [ -f "$file" ]; then
              raw=$(du -h "$file" | cut -f1)
              gzip=$(gzip -c "$file" | wc -c | awk '{printf "%.1fK", $1/1024}')
              echo "| \`$file\` | $raw | $gzip |" >> $GITHUB_STEP_SUMMARY
            fi
          done
