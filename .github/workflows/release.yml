# Release -- tag it, test it, ship it. In that order.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # Heavy lifting stays on the dedicated self-hosted runner.
  verify:
    name: Verify
    runs-on: [self-hosted, linux, x64, vps]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build

  # Publish must run on a github-hosted runner: OIDC trusted publishing
  # auto-attaches sigstore provenance, which npm only verifies from
  # github-hosted runners -- self-hosted publishes are rejected with E422.
  publish:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24.x
          cache: pnpm

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Auth via OIDC trusted publishing -- no token needed (configured on
      # npmjs.com). prepublishOnly rebuilds dist/ before packing.
      - name: Publish to npm
        run: npm publish --access public

      - name: GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          generate_release_notes: true
