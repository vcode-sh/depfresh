name: Feature Request
description: Got an idea? Pitch it.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Just remember: every feature is code I'm
        volunteering to maintain forever. A request is not a roadmap commitment.

  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: "Not \"I want X.\" Tell me what's actually painful. \"When I do Y, I can't Z\" -- that's a problem."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: How should it work?
      description: CLI flags, config options, behaviour changes. Be specific or don't bother.
    validations:
      required: true

  - type: textarea
    id: public-contract
    attributes:
      label: Proposed public contract
      description: Describe exact CLI, library, schema, result, and exit-semantics changes without relying on hidden behavior.
    validations:
      required: true

  - type: textarea
    id: authority
    attributes:
      label: Authority and side effects
      description: List every file, process, network, install, global, VCS, or publishing capability needed, and which operations remain read-only.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What else did you try?
      description: Workarounds, other tools, staring at the ceiling. Optional.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Screenshots, links, existential dread about dependency management. All valid.
    validations:
      required: false
